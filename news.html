<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЭТИ СГТУ — Новости</title>
    <script type="text/javascript" src="https://vk.com/js/api/openapi.js?169"></script>
    <style>
        :root {
            --dark-bg: #0a0f1d;
            --card-bg: #131a2e;
            --accent-blue: #0071e3;
            --neon-glow: #00f2fe;
            --text-main: #f5f6f9;
            --text-muted: #8a99a8;
        }

        * { box-sizing: border-box; transition: all 0.25s ease; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
            color: var(--text-main);
            line-height: 1.6;
        }

        header {
            background: linear-gradient(180deg, rgba(19,26,46,1) 0%, rgba(10,15,29,1) 100%);
            padding: 25px 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .header-container {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }

        .logo-container {
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .logo-container img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 113, 227, 0.2);
        }

        nav {
            display: flex;
            gap: 8px;
            background: rgba(255, 255, 255, 0.03);
            padding: 6px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.07);
            width: 100%;
            justify-content: center;
        }

        nav a {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.95rem;
            padding: 12px 24px;
            border-radius: 8px;
            letter-spacing: 0.5px;
        }

        nav a:hover { color: #fff; background: rgba(255, 255, 255, 0.05); }
        nav a.active { background: var(--accent-blue); color: #fff; box-shadow: 0 4px 15px rgba(0, 113, 227, 0.4); }

        main {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h2 { color: #fff; font-size: 2.2rem; margin-bottom: 25px; font-weight: 700; }

        /* Контейнер для авто-синхронизируемой ленты */
        .news-wrapper {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: center;
            width: 100%;
        }

        /* Центрирование и адаптивность самого виджета */
        #vk_groups, #vk_groups iframe {
            width: 100% !important;
            border-radius: 12px;
        }

        /* Автоматическая оптимизация под мобильные телефоны */
        @media (max-width: 768px) {
            nav { flex-direction: column; gap: 4px; }
            nav a { width: 100%; text-align: center; padding: 12px; }
            h2 { font-size: 1.6rem; }
            .news-wrapper { padding: 10px; border-radius: 12px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <div class="logo-container">
                <img src="https://lh5.googleusercontent.com/proxy/Np35Go7GCO1S3sTQyDR7W7uH_HahaG17E_zWn0Pouec2dVHYo44QTrf4IZ8AlFRQqAwMhvlyH_AWIPqZ-iJ0UgYxw-X0lBVuHXTuKE8G" alt="Логотип ЭТИ СГТУ">
            </div>
            <nav>
                <a href="index.html">Главная</a>
                <a href="specialties.html">Специальности</a>
                <a href="news.html" class="active">Новости</a>
                <a href="contacts.html">Контакты</a>
            </nav>
        </div>
    </header>

    <main>
        <h2>Актуальные события института</h2>
        
        <div class="news-wrapper">
            <div id="vk_groups"></div>
        </div>
    </main>

    <footer>
        <p>© 2026 ЭТИ (филиал) СГТУ им. Гагарина Ю.А. Официальный академический ресурс.</p>
    </footer>

    <script type="text/javascript">
        // Функция инициализации динамической ленты
        function initVKWidget() {
            if (typeof VK !== 'undefined' && VK.Widgets && VK.Widgets.Group) {
                VK.Widgets.Group("vk_groups", {
                    mode: 4,           // Режим 4 выводит только чистую ленту новостей (стену) без списка участников
                    width: "auto",     // Автоматическое растягивание по ширине родительского блока (важно для мобилок)
                    height: "700",     // Высота блока скроллинга новостей
                    color1: '131A2E',  // Цвет фона виджета (синхронизирован с нашим --card-bg)
                    color2: 'F5F6F9',  // Цвет текста новостей (синхронизирован с --text-main)
                    color3: '0071E3'   // Цвет ссылок и инфо-элементов (наш --accent-blue)
                }, 537397);            // ID публичной страницы ЭТИ СГТУ (vk.com/eti_sstu)
            }
        }

        // Запуск генерации после полной загрузки объектной модели страницы
        window.addEventListener('DOMContentLoaded', initVKWidget);
    </script>
</body>
</html>
